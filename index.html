<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DELUX DİGİTAL Teklif Sistemi</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
background:#ff6600;
color:white;
padding:20px;
}

header h1{
margin:0;
}

.container{
padding:25px;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

.card{
background:white;
padding:35px;
border-radius:12px;
text-align:center;
cursor:pointer;
box-shadow:0 3px 8px rgba(0,0,0,.15);
font-size:22px;
transition:.3s;
}

.card:hover{
transform:scale(1.03);
}

#teklifEkrani{
display:none;
margin-top:30px;
background:white;
padding:25px;
border-radius:10px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:20px;
font-size:16px;
}

button{
background:#ff6600;
color:white;
border:none;
padding:12px 25px;
border-radius:6px;
cursor:pointer;
font-size:16px;
}
</style>

</head>

<body>

<header>

<h1>DELUX DİGİTAL</h1>

<p>Teklif Yönetim Sistemi</p>

</header>

<div class="container">

<div class="menu">

<div class="card" onclick="yeniTeklif()">
📝<br><br>
Yeni Teklif
</div>

<div class="card">
👥<br><br>
Müşteriler
</div>

<div class="card">
📦<br><br>
Ürünler
</div>

<div class="card">
📄<br><br>
Teklifler
</div>

<div class="card">
📊<br><br>
Raporlar
</div>

<div class="card">
⚙️<br><br>
Ayarlar
</div>

</div>

<div id="teklifEkrani">

<h2>Yeni Teklif Oluştur</h2>

<input placeholder="Müşteri Adı">

<input placeholder="Telefon">

<input placeholder="Adres">
<hr>

<h3>Ürün Bilgileri</h3>

<table style="width:100%;border-collapse:collapse;">
<thead>
<tr style="background:#ff6600;color:white;">
<th>Ürün</th>
<th>Adet</th>
<th>Birim Fiyat</th>
<th>Toplam</th>
</tr>
</thead>

<tbody>

<tr>

<td>

<select id="urun" style="width:100%;padding:10px;">

<option>Kamera Sistemi</option>
<option>D-Smart TV</option>
<option>D-Smart İnternet</option>
<option>Uydu Sistemi</option>
<option>Diafon Sistemi</option>
<option>Network Sistemi</option>

</select>

</td>

<td>

<input id="adet" type="number" value="1" onkeyup="hesapla()" onchange="hesapla()">

</td>

<td>

<input id="fiyat" type="number" value="0" onkeyup="hesapla()" onchange="hesapla()">

</td>

<td>

<input id="toplam" readonly>

</td>

</tr>

</tbody>

</table>

<br>

<h2 id="genelToplam">Genel Toplam : 0 ₺</h2>
<button>Teklifi Kaydet</button>

</div>

</div>

<script>
function hesapla(){

let adet=parseFloat(document.getElementById("adet").value)||0;

let fiyat=parseFloat(document.getElementById("fiyat").value)||0;

let toplam=adet*fiyat;
let para = toplam.toLocaleString("tr-TR", {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
});

document.getElementById("toplam").value = para + " ₺";

document.getElementById("genelToplam").innerHTML = "Genel Toplam : " + para + " ₺";



}
function yeniTeklif(){

document.getElementById("teklifEkrani").style.display="block";

window.scrollTo(0,document.body.scrollHeight);

}

</script>

</body>
</html>
