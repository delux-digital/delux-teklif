<!DOCTYPE html>

padding:0;

}

body{

}

header{
background:#ff6600;
color:white;
padding:20px;
font-size:28px;

}

header p{

}

.menu{
display:flex;
gap:20px;

}

.card{

}

.card:hover{
transform:translateY(-8px);

.footer{
